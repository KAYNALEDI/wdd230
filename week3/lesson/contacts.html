<!DOCTYPE html>
<html lang="en">
  <head>
    <title>The Whimsical</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" type="text/css" href="styles.css" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Quicksand&family=Ubuntu:wght@700&display=swap") * {
        box-sizing: border-box;
      }

      input[type="text"],
      select,
      textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
        margin-top: 6px;
        margin-bottom: 16px;
        resize: vertical;
      }

      input[type="submit"] {
        background-color: #006D77;
        color: white;
        padding: 12px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }

      input[type="submit"]:hover {
        background-color: #FF6B88;
      }

      .container {
        border-radius: 5px;
        background-color: #E29578;
        padding: 20px;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo-box">
        <img
          class="logo-image"
          src="https://cdn.glitch.com/c718e11d-7f9b-4f6d-b1ad-fca528511905%2FParmesan%20Cheese.png?v=1602919010023"
          alt="The Whimsical Logo"
        />
      </div>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="faqs.html">FAQs</a></li>
          <li><a href="contact.html">Contact Us</a></li>
          <li><a href="personal-site-plan.html">Site Plan</a></li>
          <li><a href="rates.html">Rates</a></li>
          <li><a href="forms.html">Forms</a></li>
          <li><a href="card.html">Card</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <div class="banner-box">
        <img
          class="banner-image"
          src="https://cdn.glitch.com/c718e11d-7f9b-4f6d-b1ad-fca528511905%2FColorful%20Confetti%20Etsy%20Banner.png?v=1603946157443"
          alt="banner"
        />
      </div>

      <h3>Contact Form</h3>

      <div class="container">
        <form action="/action_page.php">
          <label for="fname">First Name</label>
          <input
            type="text"
            id="fname"
            name="firstname"
            placeholder="Your name.."
          />

          <label for="lname">Last Name</label>
          <input
            type="text"
            id="lname"
            name="lastname"
            placeholder="Your last name.."
          />

          <label for="country">Country</label>
          <select id="country" name="country">
            <option value="australia">Australia</option>
            <option value="canada">Canada</option>
            <option value="usa">USA</option>
          </select>

          <label for="subject">Subject</label>
          <textarea
            id="subject"
            name="subject"
            placeholder="Write something.."
            style="height:200px"
          ></textarea>

          <input type="submit" value="Submit" />
        </form>
      </div>
    </main>
    <footer>
      <p class="footer-copyright">
        &copy; 2022- The Whimsical- Nokwazi Kunene 
      </p>
      <div class="social">
        <a href="https://facebook.com">
          <img
            src="https://cdn.glitch.com/a336bbab-510f-4871-bafe-2be509c41141%2Fimages.png?v=1600478836087"
            alt="Facebook"
            style="width:20px;height:20px;"
          />
        </a>

        <a href="https://instagram.com">
          <img
            src="https://cdn.glitch.com/a336bbab-510f-4871-bafe-2be509c41141%2Finstagram-icon_1057-2227.jpg?v=1600478937730"
            alt="Instagram"
            style="width:20px;height:20px;"
          />
        </a>

        <a href="https://twitter.com">
          <img
            src="https://cdn.glitch.com/a336bbab-510f-4871-bafe-2be509c41141%2F124021.png?v=1600478819934"
            alt="Twitter"
            style="width:20px;height:20px;"
          />
        </a>
      </div>
    </footer>
  </body>
</html>
