<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather API</title>
  <link href="css/weather-api.css" rel="stylesheet">
</head>
  
<body>
<div class="container">
  
  <div id="app-display">
    <h1>Local Weather App</h1>
  
       <div id="location">
        Your Location is <span id="city">Loading...</span>, <span id="state"></span>
      </div><!--End of Location-->

   <div id="weather">
          <div class="row">
             <span id="wIcon"></span>
         </div>

          <div class="row">
           It's <span id="temp"></span> over there!
         </div>

          <div class="row">
         <button class="btn btn-primary" id="btnToggle">Convert C/F Temp</button>
          </div>
  </div><!--End of Weather-->

  
     <script src="/lesson10/js/weather-api.js"></script>
 
</div>
</body>
</html>
